site_name: Takes for Blender — User Guide
site_description: >-
  Stage Management, Variant Switching, and Batch Rendering pipeline
  for Product Visualization in Blender 5.1+.
site_author: Nikolaj Woroschilow
site_url: https://niwo-dev.github.io/Takes-for-Blender-Wiki/wiki/

repo_url: https://github.com/niwo-dev/Takes-for-Blender-Wiki
repo_name: Takes-for-Blender-Wiki
edit_uri: edit/main/docs/

copyright: "&copy; 2026 Nikolaj Woroschilow"

extra:
  alternate:
    - name: English
      link: /Takes-for-Blender-Wiki/wiki/
      lang: en
    - name: Deutsch
      link: /Takes-for-Blender-Wiki/wiki/de/
      lang: de

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: de
          name: Deutsch
          default: false
          build: true

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # 1. Standard Dark Mode (Default)
    - scheme: slate
      primary: black
      accent: black
      toggle:
        icon: material/brightness-4
        name: Switch to Light Pattern
    # 2. Standard Light Mode
    - scheme: default
      primary: black
      accent: black
      toggle:
        icon: material/brightness-7
        name: Switch to Dark Pattern
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tooltip
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    logo: material/layers-triple
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md
  - Getting Started:
    - getting_started/index.md
    - Installation: getting_started/installation.md
    - First Steps: getting_started/first_steps.md
  - Interface:
    - interface/index.md
    - Navigation Panel: interface/navigation_panel.md
    - Inspector Panel: interface/inspector_panel.md
    - Context Properties: interface/context_properties.md
    - Variant Tree: interface/variant_tree.md
    - Hotkeys: interface/hotkeys.md
  - Features:
    - features/index.md
    - Takes: features/takes.md
    - Cascade System: features/cascade.md
    - Variant Switch: features/variant_switch.md
    - Batch Render: features/batch_render.md
    - Render Presets: features/render_presets.md
    - Rest State: features/rest_state.md
    - Smart Output: features/smart_output.md
  - Workflows:
    - workflows/index.md
    - Animation Variants: workflows/animation_variants.md
    - Material Variants: workflows/material_variants.md
    - Batch Rendering: workflows/batch_rendering.md
  - Preferences: preferences/index.md
  - FAQ: faq.md
  - Brand Guidelines: corporate_identity.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/niwo-dev/Takes-for-Blender
