site_name: Takes for Blender — User Guide
site_description: >-
  Stage Management, Variant Switching, and Batch Rendering pipeline
  for Product Visualization in Blender 5.1+.
site_author: Nikolaj Woroschilow
site_url: https://niwo-dev.github.io/Takes-for-Blender-Wiki/wiki/


validation:
  nav:
    omitted_files: ignore

copyright: "&copy; 2026 Nikolaj Woroschilow"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/niwo-dev/Takes-for-Blender

plugins:
  - search
  - macros:
      module_name: macros
      on_error_fail: true

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # 1. Standard Dark Mode (Default)
    - scheme: slate
      primary: black
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to Light Pattern
    # 2. Standard Light Mode
    - scheme: default
      primary: black
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to Dark Pattern
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.tracking
    - navigation.tooltip
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    logo: material/layers-triple
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md
  - Getting Started:
    - getting_started/index.md
    - Installation: getting_started/installation.md
    - First Steps: getting_started/first_steps.md
  - Interface:
    - interface/index.md
    - Navigation Panel: interface/navigation_panel.md
    - Inspector Panel: interface/inspector_panel.md
    - Context Properties: interface/context_properties.md
    - Variant Tree: interface/variant_tree.md
    - Hotkeys: interface/hotkeys.md
  - Features:
    - features/index.md
    - Core:
      - Takes: features/takes.md
      - Cascade System: features/cascade.md
      - VL Versions: features/vl_versions.md
      - Globals Panel: features/globals.md
    - Automation:
      - Tags: features/tags.md
      - Rules: features/rules.md
      - Variant Switch: features/variant_switch.md
      - Smart Output: features/smart_output.md
    - Production:
      - Render Presets: features/render_presets.md
      - Batch Render: features/batch_render.md
      - Rest State: features/rest_state.md
      - VL Preview: features/vl_preview.md
    - Extras:
      - Bookmarks: features/bookmarks.md
      - Pie Menus: features/pie_menus.md
      - Process Monitor: features/process_monitor.md
  - Workflows:
    - workflows/index.md
    - Animation Variants: workflows/animation_variants.md
    - Material Variants: workflows/material_variants.md
    - Batch Rendering: workflows/batch_rendering.md
  - Preferences:
    - preferences/index.md
    - Workflow: preferences/workflow.md
    - UI: preferences/ui.md
    - Data: preferences/data.md
    - Debug: preferences/debug.md
    - Advanced: preferences/advanced.md
  - Roadmap: roadmap/index.md
  - FAQ: faq.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/toc-icons.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/niwo-dev/Takes-for-Blender
