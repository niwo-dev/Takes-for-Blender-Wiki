name: Deploy Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'macros.py'
      - 'index.html'
  schedule:
    # Daily catch-up in case the addon repo's notify webhook is missed
    - cron: '0 3 * * *'
  repository_dispatch:
    types: [addon-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The addon repo is the single source of truth for UI strings.
      # We shallow-clone it and run its manifest extractor in-place.
      # The addon repo is private, so we need a PAT secret with
      # `Contents: Read` permission on niwo-dev/Takes-for-Blender.
      - name: Checkout addon source
        uses: actions/checkout@v4
        with:
          repository: niwo-dev/Takes-for-Blender
          path: .addon-src
          ref: main
          token: ${{ secrets.ADDON_REPO_READ_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs + macros plugin
        run: pip install mkdocs-material mkdocs-macros-plugin

      - name: Generate UI manifest from addon source
        run: |
          mkdir -p docs/_data
          python .addon-src/dev/build/manifest_extractor.py \
            --addon-root .addon-src \
            --out docs/_data/ui_manifest.json
          echo "manifest counts:"
          python -c "import json; m=json.load(open('docs/_data/ui_manifest.json')); print(m['_meta']['counts'])"

      - name: Generate roadmap board from addon source
        run: |
          python .addon-src/dev/scripts/build_wiki_roadmap.py \
            --addon-root .addon-src \
            --wiki .
          echo "roadmap pages:"; ls docs/roadmap

      - name: Mirror changelogs from addon source
        run: |
          mkdir -p docs/changelog
          cp .addon-src/CHANGELOG.md docs/changelog/index.md
          # Dev changelog: rewrite its sibling link so MkDocs --strict resolves it
          # (CHANGELOG.md -> the user changelog page at changelog/index.md == ./).
          sed 's|](CHANGELOG.md)|](./)|g' .addon-src/CHANGELOG_DEV.md > docs/changelog/dev.md
          echo "changelog pages:"; ls docs/changelog

      - name: Verify wiki against manifest (string drift)
        run: |
          python .addon-src/dev/build/verify_wiki.py \
            --wiki docs \
            --manifest docs/_data/ui_manifest.json \
            --out /tmp/verify_findings.json

      - name: Build MkDocs into wiki subdirectory
        run: mkdocs build --strict

      - name: Assemble deploy directory
        run: |
          mkdir -p deploy/wiki
          cp index.html deploy/
          cp -r media deploy/
          cp -r site/* deploy/wiki/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          force_orphan: true
