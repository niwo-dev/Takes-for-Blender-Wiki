name: Deploy Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'index.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs & Translators
        run: pip install mkdocs-material mkdocs-static-i18n deepl

      - name: Run Auto-Translator Pipeline (DeepL)
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: python scripts/translate_docs.py
        continue-on-error: true

      - name: Auto-Commit Translated Documents
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(i18n): Auto-translate missing documentation [skip ci]"
          file_pattern: 'docs/**/*.de.md docs/**/*.es.md docs/**/*.ru.md docs/**/*.zh.md docs/**/*.ja.md docs/**/*.vi.md'

      - name: Build MkDocs into wiki subdirectory
        run: mkdocs build --strict

      - name: Assemble deploy directory
        run: |
          mkdir -p deploy/wiki
          cp index.html deploy/
          cp -r site/* deploy/wiki/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          force_orphan: true
