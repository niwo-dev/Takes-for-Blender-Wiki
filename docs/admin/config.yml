backend:
  name: github
  repo: niwo-dev/Takes-for-Blender-Wiki
  branch: main
  base_url: https://sveltia-cms-auth.icy-voice-2d22.workers.dev

media_folder: "docs/assets"
public_folder: "/wiki/assets"

collections:
  - name: "en"
    label: "🇬🇧 English"
    folder: "docs/en"
    create: true
    nested:
      depth: 10
    slug: "{{slug}}"
    extension: "md"
    fields:
      - {label: "Icon", name: "icon", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

