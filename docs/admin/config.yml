backend:
  name: github
  repo: niwo-dev/Takes-for-Blender-Wiki
  branch: main

media_folder: "docs/assets"
public_folder: "/wiki/assets"

collections:
  - name: "root-pages"
    label: "Root Pages"
    folder: "docs"
    create: true
    nested: false
    slug: "{{slug}}"
    extension: "md"
    fields:
      - {label: "Icon", name: "icon", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "getting-started"
    label: "Getting Started"
    folder: "docs/getting_started"
    create: true
    slug: "{{slug}}"
    extension: "md"
    fields:
      - {label: "Icon", name: "icon", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}

