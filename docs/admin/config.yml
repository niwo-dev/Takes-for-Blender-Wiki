backend:
  name: github
  repo: niwo-dev/Takes-for-Blender-Wiki
  branch: main
  base_url: https://sveltia-cms-auth.icy-voice-2d22.workers.dev

media_folder: "docs/en/assets"
public_folder: "/wiki/assets"

i18n:
  structure: multiple_folders
  locales: [en, de, es, ru, zh, ja, vi]
  default_locale: en

collections:
  - name: "pages"
    label: "Pages"
    folder: "docs"
    path: "{{locale}}/{{slug}}"
    create: true
    slug: "{{slug}}"
    extension: "md"
    i18n: true
    fields:
      - {label: "Icon", name: "icon", widget: "string", required: false, i18n: true}
      - {label: "Body", name: "body", widget: "markdown", i18n: true}

  - name: "getting-started"
    label: "Getting Started"
    folder: "docs"
    path: "{{locale}}/getting_started/{{slug}}"
    create: true
    slug: "{{slug}}"
    extension: "md"
    i18n: true
    fields:
      - {label: "Icon", name: "icon", widget: "string", required: false, i18n: true}
      - {label: "Body", name: "body", widget: "markdown", i18n: true}

